apiVersion: v1
kind: Namespace
metadata:
  name: nas-search

---
# ConfigMap for application settings
apiVersion: v1
kind: ConfigMap
metadata:
  name: nas-search-config
  namespace: nas-search
data:
  FLASK_ENV: "production"
  LOG_LEVEL: "INFO"
  ELASTICSEARCH_HOST: "elasticsearch-service"
  ELASTICSEARCH_PORT: "9200"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: nas-search-secrets
  namespace: nas-search
type: Opaque
stringData:
  CLAUDE_API_KEY: "${CLAUDE_API_KEY}"
  GEMINI_API_KEY: "${GEMINI_API_KEY}"
  ELASTICSEARCH_PASSWORD: "${ELASTICSEARCH_PASSWORD}"

---
# Elasticsearch Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: nas-search
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.19.3
        ports:
        - containerPort: 9200
        env:
        - name: discovery.type
          value: "single-node"
        - name: xpack.security.enabled
          value: "false"
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /_cluster/health
            port: 9200
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_cluster/health
            port: 9200
          initialDelaySeconds: 20
          periodSeconds: 5
        volumeMounts:
        - name: elasticsearch-storage
          mountPath: /usr/share/elasticsearch/data
      volumes:
      - name: elasticsearch-storage
        persistentVolumeClaim:
          claimName: elasticsearch-pvc

---
# Elasticsearch Service
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-service
  namespace: nas-search
spec:
  selector:
    app: elasticsearch
  ports:
  - protocol: TCP
    port: 9200
    targetPort: 9200
  type: ClusterIP

---
# Flask App Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nas-search-app
  namespace: nas-search
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nas-search-app
  template:
    metadata:
      labels:
        app: nas-search-app
    spec:
      containers:
      - name: app
        image: nas-search-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: nas-search-config
        - secretRef:
            name: nas-search-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5

---
# Flask App Service
apiVersion: v1
kind: Service
metadata:
  name: nas-search-app-service
  namespace: nas-search
spec:
  selector:
    app: nas-search-app
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
  type: ClusterIP

---
# PersistentVolumeClaim for Elasticsearch
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc
  namespace: nas-search
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nas-search-ingress
  namespace: nas-search
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: nas-search.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nas-search-app-service
            port:
              number: 5000
