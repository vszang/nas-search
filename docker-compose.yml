version: '3.8'

services:
  # Elasticsearch 서비스
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.3
    container_name: nas-search-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nas-search-network

  # Flask 백엔드
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nas-search-app
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_APP=app.py
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NAS_PATH=${NAS_PATH:-/mnt/nas}
    volumes:
      - ./src:/app/src
      - ./app.py:/app/app.py
      - ${NAS_PATH}:/mnt/nas:ro
    ports:
      - "5000:5000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nas-search-network
    command: python app.py

  # Vite 프론트엔드 (개발 모드)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: nas-search-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - app
    networks:
      - nas-search-network
    environment:
      - VITE_API_BASE_URL=http://app:5000
    command: npm run dev -- --host

volumes:
  elasticsearch_data:
    driver: local

networks:
  nas-search-network:
    driver: bridge
